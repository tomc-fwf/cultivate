  /recipes/fertigation/{id}/version:
    post:
      tags: [fertigation-recipes]
      summary: Create a new version of an existing recipe
      description: >
        Supersedes the given active recipe (sets active=0, superseded_at=now) and
        creates a new version with the next version string (e.g. "1.0" → "1.1").
        Both operations happen in a single transaction. Existing applications
