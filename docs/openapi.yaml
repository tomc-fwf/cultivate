  # ─── PESTICIDE APPLICATIONS ──────────────────────────────────────────────────

  /pesticide-applications:
    get:
      tags: [pesticide-applications]
      summary: List pesticide applications
      description: >
        Returns pesticide applications enriched with strain, sub-zone, and applicator
        name. Each record has computed `editable` and `rei_active` flags.

        When `?rei_active=1` the date filter is ignored and only applications with
        unexpired, uncleared REIs are returned (powers the REI Status Dashboard).
      parameters:
        - name: batch_id
          in: query
          required: false
          schema: { type: integer }
        - name: date
          in: query
          required: false
          schema: { type: string, example: today }
          description: "`today` (default), `YYYY-MM-DD`, `7d`, or `30d`. Ignored when rei_active=1."
        - name: rei_active
          in: query
          required: false
          schema: { type: string, enum: ['1'] }
          description: Pass `1` to retrieve all applications with currently active REIs
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 50, maximum: 500 }
      responses:
        '200':
          description: Array of pesticide applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PesticideApplication'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [pesticide-applications]
      summary: Create a pesticide application
      description: >
        Records a full MN MDA-compliant pesticide application (MN Statute 18B.37).

        **Business rules enforced (hard blocks unless noted):**
        - Rule 16 — `input_lot_id` required
        - Rule 17 — `target_pest`, `ambient_temp_f`, `wind_speed_mph` required
        - Rule 18 — PHI checked using `phi_days_operational` from farmstock; violation
          requires `phi_override_notes` to proceed (422 otherwise)
        - Rule 19 — Stage block from `input_phi_stage_overrides`; cannot be overridden
        - Rule 20 — `rei_expires_at` computed as `applied_at + rei_hours`
        - Rule 21 — `applicator_license` required for restricted-use products (RUP)
        - **EPA reverse-check:** No EPA number on item → 422 `redirect: "foliar"`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - batch_id
                - applied_at
                - input_id
                - input_lot_id
                - rate_value
                - rate_unit
                - volume_applied
                - volume_unit
                - application_method
                - target_pest
                - ambient_temp_f
                - wind_speed_mph
              properties:
                batch_id: { type: integer }
                row_id: { type: string, nullable: true }
                container_id: { type: string, nullable: true }
                applied_at: { type: string, format: date-time }
                input_id: { type: integer, description: Farmstock item ID — must be EPA-registered }
                input_lot_id: { type: integer, description: Required (Rule 16) — lot tracking is non-negotiable for pesticides }
                rate_value: { type: number }
                rate_unit: { type: string }
                volume_applied: { type: number }
                volume_unit: { type: string }
                application_method:
                  type: string
                  enum: [foliar_spray, soil_drench, granular, other]
                target_pest:
                  type: string
                  description: What is being controlled (Rule 17 — required)
                pest_pressure:
                  type: string
                  nullable: true
                  enum: [incidental, threshold, outbreak]
                ambient_temp_f: { type: number, description: Required (MN Statute 18B.37) }
                ambient_rh: { type: number, nullable: true }
                wind_speed_mph: { type: number, description: Required (MN Statute 18B.37) }
                wind_direction: { type: string, nullable: true }
                expected_harvest_date:
                  type: string
                  format: date
                  nullable: true
                  description: For PHI calculation. Falls back to batch.harvest_date if omitted.
                applicator_license:
                  type: string
                  nullable: true
                  description: Required for restricted-use pesticides (Rule 21)
                phi_override_notes:
                  type: string
                  nullable: true
                  description: Required when applying within the PHI window (Rule 18 override)
                notes: { type: string, nullable: true }
      responses:
        '201':
          description: Pesticide application created. Includes `warning` field if PHI override recorded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pesticide_app_id: { type: integer }
                  batch_id: { type: integer }
                  phi_compliant: { type: integer, nullable: true, enum: [0, 1] }
                  rei_expires_at: { type: string, format: date-time, nullable: true }
                  rei_hours: { type: number, nullable: true }
                  target_area: { type: string, nullable: true, description: container_id or row_id }
                  warning: { type: string, description: Present when phi_compliant=0 and override was recorded }
        '400':
          description: Validation error or batch closed/not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: >
            Hard business rule violation — inspect fields for client action.
            `redirect: "foliar"` — no EPA number; use foliar form.
            `restricted_use: true` — RUP requires applicator_license.
            `phi_violation: true` — within PHI window; provide phi_override_notes.
            `stage_blocked: true` — product blocked in current growth stage; no override.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  redirect: { type: string, enum: [foliar] }
                  restricted_use: { type: boolean }
                  phi_violation: { type: boolean }
                  phi_days_operational: { type: number }
                  days_until_harvest: { type: integer }
                  stage_blocked: { type: boolean }
                  reason: { type: string }
                  input_id: { type: integer }

  /pesticide-applications/{id}/clear-rei:
    post:
      tags: [pesticide-applications]
      summary: Clear REI — sign off area as safe to re-enter
      description: >
        Records `rei_cleared_at` and `rei_cleared_by` on the application. Called after
        the re-entry interval has elapsed and the area has been inspected as safe.
        Returns 409 if already cleared or if no REI exists on this application.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
          description: Pesticide application ID
      responses:
        '200':
          description: REI cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  pesticide_app_id: { type: integer }
                  rei_cleared_at: { type: string, format: date-time }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Application not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: REI already cleared, or this application has no REI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

