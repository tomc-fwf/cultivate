  # ─── OBSERVATIONS ───────────────────────────────────────────────────────────

  /observations/readiness-summary:
    get:
      tags: [observations]
      summary: Harvest readiness summary per row
      description: >
        Returns per-row harvest readiness aggregates for a batch by summarising the
        most recent `harvest_readiness` observation per container. Used to populate
        the row-readiness progress bars on BatchDetail during `harvest_window` status.
      parameters:
        - name: batch_id
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Per-row readiness summary
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    row_id: { type: string, example: "Z1-A-R3" }
                    observed_containers: { type: integer, description: Containers with at least one harvest_readiness observation }
                    ready_count: { type: integer, description: Containers where most-recent observation has ready_to_harvest=1 }
                    avg_maturity_pct: { type: number, nullable: true }
                    last_observed_at: { type: string, format: date-time }
        '400':
          description: Missing or non-numeric batch_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /observations:
    get:
      tags: [observations]
      summary: List observations
      description: >
        Returns observations enriched with batch strain, sub-zone, batch status, and
        observer name. Default date filter is today. Each record includes `editable`
        (true within 24 hours of observed_at).
      parameters:
        - name: batch_id
          in: query
          required: false
          schema: { type: integer }
        - name: date
          in: query
          required: false
          schema: { type: string, example: today }
          description: "`today` (default), `YYYY-MM-DD`, `7d`, or `30d`"
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [healthy, pest, deficiency, disease, damage, harvest_readiness, other]
        - name: row_id
          in: query
          required: false
          schema: { type: string, example: "Z1-A-R3" }
        - name: container_id
          in: query
          required: false
          schema: { type: string, example: "Z1-A-R3-C12" }
        - name: unresolved
          in: query
          required: false
          schema: { type: string, enum: ['1'] }
          description: Pass `1` to return only unresolved observations
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 100, maximum: 1000 }
      responses:
        '200':
          description: Array of observations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Observation'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [observations]
      summary: Create an observation
      description: >
        Logs a plant or row observation. Batch must exist and not be closed.

        **Business rules:**
        - `severity` is required for all categories except `harvest_readiness`
        - `harvest_readiness` category enables `maturity_pct`, `ready_to_harvest`, and
          `harvest_priority` fields — these accumulate as evidence for the management
          decision to begin harvesting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [batch_id, category]
              properties:
                batch_id: { type: integer }
                row_id: { type: string, nullable: true }
                container_id: { type: string, nullable: true }
                observed_at: { type: string, format: date-time, description: Defaults to now }
                category:
                  type: string
                  enum: [healthy, pest, deficiency, disease, damage, harvest_readiness, other]
                severity:
                  type: string
                  nullable: true
                  enum: [low, medium, high]
                  description: Required for all categories except harvest_readiness
                note: { type: string, nullable: true }
                maturity_pct: { type: integer, minimum: 0, maximum: 100, nullable: true }
                ready_to_harvest: { type: number, nullable: true, description: "0 or 1" }
                harvest_priority: { type: integer, nullable: true }
                triggered_app_id: { type: string, nullable: true }
      responses:
        '201':
          description: Observation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  observation_id: { type: integer }
                  batch_id: { type: integer }
                  category: { type: string }
                  batch_status: { type: string }
        '400':
          description: Validation error, missing severity, batch not found, or batch closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /observations/{id}:
    patch:
      tags: [observations]
      summary: Edit an observation (24h window)
      description: >
        Partial update of observation fields within 24 hours of observed_at.
        Supports marking an observation resolved via `resolved_at` + `resolution_note`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                observed_at: { type: string, format: date-time }
                category:
                  type: string
                  enum: [healthy, pest, deficiency, disease, damage, harvest_readiness, other]
                severity: { type: string, nullable: true, enum: [low, medium, high] }
                note: { type: string, nullable: true }
                maturity_pct: { type: integer, minimum: 0, maximum: 100, nullable: true }
                ready_to_harvest: { type: number, nullable: true }
                harvest_priority: { type: integer, nullable: true }
                resolved_at: { type: string, nullable: true, description: Set to mark resolved; null to un-resolve }
                resolution_note: { type: string, nullable: true }
      responses:
        '200':
          description: Updated observation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Observation'
        '400':
          description: Validation error or no valid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Observation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Record locked after 24 hours
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [observations]
      summary: Delete an observation (admin, 24h window)
      description: >
        Hard-deletes the observation. Admin only, within 24 hours of observed_at.

