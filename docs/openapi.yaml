      responses:
        '200':
          description: Active recipe with ingredients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FertigationRecipeDetail'
        '400':
          description: Invalid recipe name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
