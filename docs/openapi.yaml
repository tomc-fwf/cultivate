  /container-amendments:
    get:
      tags: [container-amendments]
      summary: List container amendments
      description: >
        Returns container media amendments enriched with applicator name and batch strain
        name. Default date filter is today (applied_at).
      parameters:
        - name: container_id
          in: query
          required: false
          schema: { type: string, example: "Z1-A-R3-C12" }
          description: Filter to a specific container
        - name: batch_id
          in: query
          required: false
          schema: { type: integer }
          description: Filter to amendments associated with a specific plant batch
        - name: date
          in: query
          required: false
          schema: { type: string, example: today }
          description: "`today` (default), `YYYY-MM-DD`, `7d`, or `30d`"
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 50, maximum: 500 }
      responses:
        '200':
          description: Array of container amendments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContainerAmendment'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [container-amendments]
      summary: Create a container amendment
      description: >
        Records an addition to container growing media (compost, nematodes, pH correctors,
        biological inoculants, etc.).

        `batch_id` and `container_state` are **auto-populated** from `cv_container_state`
        at submission time — do not include them in the request.

        **EPA redirect:** If `input_id` has an EPA registration number, returns 422
        with `redirect: "pesticide"`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [container_id, applied_at, amendment_type]
              properties:
                container_id:
                  type: string
                  example: Z1-A-R3-C12
                  description: Must be an existing container
                applied_at: { type: string, format: date-time }
                amendment_type:
                  type: string
                  enum: [media_replacement, amendment, inoculation, drench, top_dress, mix_in, correction, removal, other]
                application_method:
                  type: string
                  nullable: true
                  enum: [top_dress, mix_in, drench, side_dress, replaced, removed, other]
                input_id:
                  type: integer
                  nullable: true
                  description: Farmstock item ID. Must not be EPA-registered.
                input_lot_id: { type: integer, nullable: true }
                quantity: { type: number, nullable: true }
                quantity_unit: { type: string, nullable: true, example: lb }
                purpose: { type: string, nullable: true }
                soil_sample_id:
                  type: integer
                  nullable: true
                  description: Links amendment to the soil sample that drove the decision
                notes: { type: string, nullable: true }
      responses:
