    post:
      tags: [container-amendments]
      summary: Create a container amendment
      description: >
        Records an addition to container growing media (compost, nematodes, pH correctors,
        biological inoculants, etc.).

        `batch_id` and `container_state` are **auto-populated** from `cv_container_state`
