      responses:
        '204':
          description: Observation deleted
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient role — admin required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Observation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Record locked after 24 hours
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─── FERTIGATION RECIPES ─────────────────────────────────────────────────────

  /recipes/fertigation:
    get:
      tags: [fertigation-recipes]
      summary: List all 7 fertigation recipe slots
      description: >
        Returns all 7 fixed recipe name slots (BASE, SEEDLING, AUTO-VEG, AUTO-FLOWER,
        PHOTO-VEG, PHOTO-FLOWER, FLUSH) with the active version for each. Slots without
        a recipe have `recipe_id: null` and `active: null`. Includes `ingredient_count`
        and `version_count` per slot.
      responses:
        '200':
          description: Array of 7 recipe slot objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FertigationRecipe'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [fertigation-recipes]
      summary: Create first version of a recipe
      description: >
        Creates version 1.0 of a named recipe slot. Returns 409 if an active recipe
        already exists for that name — use `POST /:id/version` to create a new version.
        Requires supervisor role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, ingredients]
              properties:
                name:
                  type: string
                  enum: [BASE, SEEDLING, AUTO-VEG, AUTO-FLOWER, PHOTO-VEG, PHOTO-FLOWER, FLUSH]
                ec_target_low: { type: number, nullable: true }
                ec_target_high: { type: number, nullable: true }
                ph_target_low: { type: number, nullable: true }
                ph_target_high: { type: number, nullable: true }
                mixing_order: { type: string, nullable: true }
                notes: { type: string, nullable: true }
                ingredients:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [input_id, rate_value, rate_unit, order_index]
                    properties:
                      input_id: { type: integer }
                      rate_value: { type: number }
                      rate_unit: { type: string, example: "ml_per_gal" }
                      order_index: { type: integer }
                      notes: { type: string, nullable: true }
      responses:
        '201':
          description: Recipe created
          content:
            application/json:
              schema:
                type: object
                properties:
                  recipe_id: { type: integer }
        '400':
          description: Validation error or invalid recipe name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient role — supervisor required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Active recipe for this name already exists — use POST /:id/version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /recipes/fertigation/by-name/{name}:
