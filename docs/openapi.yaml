          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Product has EPA registration number — use pesticide application form
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  redirect: { type: string, enum: [pesticide] }
                  input_id: { type: integer }

