                ec_target_high: { type: number, nullable: true }
                ph_target_low: { type: number, nullable: true }
                ph_target_high: { type: number, nullable: true }
                mixing_order: { type: string, nullable: true }
                notes: { type: string, nullable: true }
                ingredients:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [input_id, rate_value, rate_unit, order_index]
                    properties:
                      input_id: { type: integer }
                      rate_value: { type: number }
                      rate_unit: { type: string }
                      order_index: { type: integer }
                      notes: { type: string, nullable: true }
      responses:
        '201':
          description: New recipe version created; previous version superseded
          content:
            application/json:
              schema:
                type: object
                properties:
                  recipe_id: { type: integer }
        '400':
          description: Validation error or no ingredients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient role — supervisor required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Active recipe not found with that ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

